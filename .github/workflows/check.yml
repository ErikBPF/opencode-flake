name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3

      - name: nix flake check
        run: nix flake check --print-build-logs

  # Required, not advisory: auto-merged bump PRs must prove the package
  # builds and reports the right version before they can land.
  # No third-party binary cache: the fleet substitutes prebuilt closures
  # from orion's nix-serve (warmed nightly by nix-cache-builder in
  # desktop-nixos); this job only verifies.
  package-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3

      - name: Build and smoke-test the opencode package
        run: |
          set -euo pipefail
          nix build .#opencode --print-build-logs
          version="$(nix eval --raw .#opencode.version)"
          ./result/bin/opencode --version | grep -F "$version"

  flakehub-publish:
    runs-on: ubuntu-latest
    needs: [check, package-build]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3

      - uses: DeterminateSystems/flakehub-push@0e801cf490b3b3dcb099131a69146bc59d610d0f # main, pinned 2026-06-30
        with:
          name: ErikBPF/opencode-flake
          rolling: true
          visibility: public

  flakehub-verify:
    runs-on: ubuntu-latest
    needs: flakehub-publish
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3

      - name: FlakeHub wildcard resolves to this commit
        run: |
          set -euo pipefail
          metadata="$(nix flake metadata --refresh 'https://flakehub.com/f/ErikBPF/opencode-flake/*' --json)"
          revision="$(printf '%s\n' "$metadata" | python3 -c 'import json,sys; print(json.load(sys.stdin)["revision"])')"
          if [ "$revision" != "$GITHUB_SHA" ]; then
            printf 'FlakeHub wildcard resolved %s, expected %s\n' "$revision" "$GITHUB_SHA" >&2
            exit 1
          fi
